<!doctype html>
<html lang="en">
  <head>
    <style>
      * {
        margin: 0;
        padding: 0;
        box-sizing: border-box;
      }
      body {
        width: BODY_WIDTHpx;
        height: BODY_HEIGHTpx;
        overflow: hidden;
        position: relative;
        font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      }
      .screenshot {
        width: 100%;
        height: 100%;
        display: block;
      }
      .badge {
        position: absolute;
        font-size: 11px;
        font-weight: 500;
        padding: 2px 8px;
        border-radius: 3px;
        white-space: nowrap;
        line-height: 16px;
        letter-spacing: 0.2px;
        pointer-events: none;
      }
      /* CSD Telemetry style - amber/gold with dark text */
      .badge-csd {
        background: #d4a843;
        color: #1a1a1a;
        border: 1px solid #b8922e;
      }
      /* Third-party style - medium grey with white text */
      .badge-thirdparty {
        background: #6e6e6e;
        color: #fff;
        border: 1px solid #5a5a5a;
      }
      /* Informational - blue */
      .badge-info {
        background: #4a90d9;
        color: #fff;
        border: 1px solid #3a7bc8;
      }
      /* Warning - red/orange */
      .badge-warning {
        background: #d94a4a;
        color: #fff;
        border: 1px solid #c83a3a;
      }
      /* Success - green */
      .badge-success {
        background: #4caf50;
        color: #fff;
        border: 1px solid #43a047;
      }
      /* Vertical centering — top becomes the center point */
      .badge-centered {
        transform: translateY(-50%);
      }
      /* Custom color via inline style */
    </style>
    <title>Screenshot Annotation</title>
  </head>
  <body>
    <img class="screenshot" src="SCREENSHOT_PATH" alt="Annotated screenshot" />
    <!-- BADGES_PLACEHOLDER -->
  </body>
</html>

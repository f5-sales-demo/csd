<!DOCTYPE html>
<html>
<head>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    width: BODY_WIDTHpx;
    height: BODY_HEIGHTpx;
    overflow: hidden;
    position: relative;
    font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
  }
  .screenshot {
    width: 100%;
    height: 100%;
    display: block;
  }
  .badge {
    position: absolute;
    font-size: 11px;
    font-weight: 500;
    padding: 2px 8px;
    border-radius: 3px;
    white-space: nowrap;
    line-height: 16px;
    letter-spacing: 0.2px;
    pointer-events: none;
  }
  /* CSD Telemetry style - amber/gold with dark text */
  .badge-csd {
    background: #D4A843;
    color: #1a1a1a;
    border: 1px solid #B8922E;
  }
  /* Third-party style - medium grey with white text */
  .badge-thirdparty {
    background: #6E6E6E;
    color: #fff;
    border: 1px solid #5A5A5A;
  }
  /* Informational - blue */
  .badge-info {
    background: #4A90D9;
    color: #fff;
    border: 1px solid #3A7BC8;
  }
  /* Warning - red/orange */
  .badge-warning {
    background: #D94A4A;
    color: #fff;
    border: 1px solid #C83A3A;
  }
  /* Success - green */
  .badge-success {
    background: #4CAF50;
    color: #fff;
    border: 1px solid #43A047;
  }
  /* Vertical centering — top becomes the center point */
  .badge-centered {
      transform: translateY(-50%);
  }
  /* Custom color via inline style */
</style>
</head>
<body>
  <img class="screenshot" src="SCREENSHOT_PATH" />
  <!-- BADGES_PLACEHOLDER -->
</body>
</html>
